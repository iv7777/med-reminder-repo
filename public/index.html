<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日用药提醒</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--card:#fff;--sidebar:#16213e;
  --accent:#10b981;--accent-light:#d1fae5;--accent-dark:#065f46;
  --text:#1e293b;--text2:#64748b;--text3:#94a3b8;
  --border:#e2e8f0;--danger:#ef4444;--danger-light:#fee2e2;
  --info-light:#dbeafe;--radius:12px;--radius-sm:8px;
}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Login */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#16213e 0%,#0f3460 100%)}
.login-card{background:#fff;border-radius:20px;padding:44px 40px;width:360px;box-shadow:0 25px 60px rgba(0,0,0,0.3)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .icon{font-size:44px}
.login-logo h1{font-size:22px;font-weight:700;margin-top:10px}
.login-logo p{font-size:13px;color:var(--text2);margin-top:4px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
.form-group input,.form-group select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;color:var(--text);background:#fff}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#059669}
.btn-secondary{background:var(--border);color:var(--text)}.btn-secondary:hover{background:#cbd5e1}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border)}.btn-ghost:hover{background:var(--border)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-full{width:100%;padding:13px}
.error-msg{color:var(--danger);font-size:13px;text-align:center;margin-bottom:12px;padding:9px;background:var(--danger-light);border-radius:var(--radius-sm)}

/* App */
#app{display:none;height:100vh;overflow:hidden}
.app-layout{display:flex;height:100vh}

/* Sidebar */
.sidebar{width:230px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-brand-icon{font-size:26px}
.sb-brand-name{font-size:15px;font-weight:700;color:#fff;margin-top:8px}
.sb-brand-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px}
.sb-patient{padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-patient select{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;padding:7px 10px;border-radius:var(--radius-sm);font-size:13px;font-family:inherit;outline:none}
.sb-patient select option{background:#16213e}
.nav-sec{padding:8px 0}
.nav-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.22);padding:6px 20px 4px;text-transform:uppercase;letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:14px;color:rgba(255,255,255,.5);border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(16,185,129,.15);color:#fff;border-left-color:var(--accent)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.sb-footer{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,255,255,.07)}
.sb-user{font-size:13px;color:rgba(255,255,255,.75);font-weight:500;margin-bottom:2px}
.sb-role{font-size:11px;color:rgba(255,255,255,.3);margin-bottom:12px}

/* Main */
.main{flex:1;overflow-y:auto;padding:28px 32px}
.page{display:none}.page.active{display:block}
.page-title{font-size:22px;font-weight:700;margin-bottom:20px}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px 24px;margin-bottom:16px}

/* Clock */
.clock-card{text-align:center;padding:28px}
.clock-time{font-size:54px;font-weight:300;letter-spacing:3px;font-variant-numeric:tabular-nums;line-height:1}
.clock-sec{font-size:30px;color:var(--text3)}
.clock-date{font-size:14px;color:var(--text2);margin-top:8px}
.next-pill{display:inline-block;margin-top:12px;background:var(--accent-light);color:var(--accent-dark);border-radius:20px;padding:5px 18px;font-size:13px;font-weight:600}
.prog-wrap{margin:16px 0 4px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}
.prog-lbl{font-size:12px;color:var(--text3);text-align:right;margin-top:4px}

/* Time blocks */
.tb-card{background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);margin-bottom:14px;overflow:hidden;transition:border-color .2s,opacity .2s}
.tb-card.active{border-color:var(--accent)}
.tb-card.past{opacity:.6}
.tb-header{display:flex;align-items:center;gap:12px;padding:12px 20px;background:#f8fafc;border-bottom:1px solid var(--border)}
.tb-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;flex-shrink:0}
.tb-dot.dot-on{background:var(--accent);box-shadow:0 0 0 4px rgba(16,185,129,.2)}
.tb-dot.dot-past{background:var(--accent)}
.tb-time{font-size:18px;font-weight:700}
.tb-ctx{font-size:13px;color:var(--text2)}
.tb-badge{margin-left:auto;font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px}
.badge-now{background:var(--accent-light);color:var(--accent-dark)}
.badge-past{background:#f1f5f9;color:var(--text3)}
.med-row{display:flex;align-items:flex-start;gap:14px;padding:11px 20px;border-bottom:1px solid #f8fafc}
.med-row:last-child{border-bottom:none}
.med-chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px}
.med-chk.on{background:var(--accent);border-color:var(--accent)}
.med-chk.readonly{cursor:default}
.med-chk svg{display:none}.med-chk.on svg{display:block}
.med-info{flex:1}
.med-name{font-size:14px;font-weight:500;transition:all .15s}
.med-name.done{text-decoration:line-through;color:var(--text3)}
.med-dose{font-size:13px;color:var(--text2);margin-top:2px}
.med-note{font-size:12px;color:var(--accent-dark);margin-top:3px}
.med-ts{font-size:11px;color:var(--text3);flex-shrink:0;padding-top:4px}

/* History */
.filter-bar{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.filter-bar .form-group{margin-bottom:0}
.day-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#f8fafc;border:1px solid var(--border);border-bottom:none;border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.day-title{font-weight:600;font-size:14px}
.stat-pct{font-size:12px;font-weight:700;padding:2px 10px;border-radius:20px}
.pct-hi{background:var(--accent-light);color:var(--accent-dark)}
.pct-md{background:#fef3c7;color:#92400e}
.pct-lo{background:var(--danger-light);color:#991b1b}
.hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;padding:12px;background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);margin-bottom:16px}
.h-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);font-size:12px}
.h-taken{background:var(--accent-light)}.h-missed{background:var(--danger-light)}
.h-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.h-name{font-weight:500;color:var(--text)}
.h-detail{color:var(--text2);margin-top:1px}
.h-time{color:var(--text3);margin-top:1px}

/* Schedule editor */
.ed-block{margin-bottom:20px}
.ed-bh{display:flex;align-items:center;gap:10px;padding:12px 18px;background:#f8fafc;border:1px solid var(--border);border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.ed-bh .bt{font-size:16px;font-weight:700}
.ed-bh .bc{font-size:13px;color:var(--text2)}
.ed-meds{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm)}
.ed-mr{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #f8fafc}
.ed-mr:last-child{border-bottom:none}
.ed-mi{flex:1}
.ed-mn{font-size:14px;font-weight:500}
.ed-md{font-size:12px;color:var(--text2);margin-top:2px}
.ed-ma{display:flex;gap:6px;flex-shrink:0}
.inline-form{background:#f8fafc;border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:16px;margin:10px 16px 14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:8px;margin-top:12px}

/* Users */
.u-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid #f8fafc}
.u-row:last-child{border-bottom:none}
.u-av{width:38px;height:38px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--accent-dark);flex-shrink:0}
.u-info{flex:1}
.u-name{font-weight:600;font-size:14px}
.u-meta{font-size:12px;color:var(--text2);margin-top:2px}
.rbadge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle}
.r-admin{background:var(--info-light);color:#1e40af}
.r-caregiver{background:var(--accent-light);color:var(--accent-dark)}
.r-patient{background:#f1f5f9;color:var(--text2)}

/* Misc */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:14px}
.empty{text-align:center;padding:40px;color:var(--text3)}

@media(max-width:720px){
  .sidebar{width:56px}
  .sb-brand-name,.sb-brand-sub,.nav-item span,.sb-patient,.sb-user,.sb-role{display:none}
  .main{padding:14px}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">💊</div>
      <h1>每日用药提醒</h1>
      <p>家庭健康管理系统</p>
    </div>
    <div class="form-group">
      <label>用户名</label>
      <input id="l-user" placeholder="请输入用户名" autocomplete="username">
    </div>
    <div class="form-group">
      <label>密码 / PIN</label>
      <input id="l-pin" type="password" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <div id="login-err" style="display:none" class="error-msg"></div>
    <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">登 录</button>
    <div style="margin-top:18px;font-size:11px;color:var(--text3);text-align:center;line-height:2">
      管理员：admin / admin1234<br>
      护理员：caregiver1 / care1234<br>
      患者：patient1 / 1234
    </div>
  </div>
</div>

<div id="app">
  <div class="app-layout">
    <div class="sidebar">
      <div class="sb-brand">
        <div class="sb-brand-icon">💊</div>
        <div class="sb-brand-name">每日用药提醒</div>
        <div class="sb-brand-sub">家庭健康管理</div>
      </div>
      <div class="sb-patient" id="pt-wrap">
        <select id="pt-select" onchange="onPatientChange()"></select>
      </div>
      <div class="nav-sec">
        <div class="nav-lbl">功能</div>
        <div class="nav-item active" data-page="today" onclick="go('today')">
          <span class="nav-icon">🕐</span><span>今日用药</span>
        </div>
        <div class="nav-item" data-page="history" onclick="go('history')">
          <span class="nav-icon">📋</span><span>服药记录</span>
        </div>
        <div class="nav-item" id="nav-schedule" data-page="schedule" onclick="go('schedule')">
          <span class="nav-icon">✏️</span><span>用药计划</span>
        </div>
        <div class="nav-item" id="nav-users" data-page="users" onclick="go('users')" style="display:none">
          <span class="nav-icon">👥</span><span>用户管理</span>
        </div>
      </div>
      <div class="sb-footer">
        <div class="sb-user" id="sb-user"></div>
        <div class="sb-role" id="sb-role"></div>
        <button class="btn btn-ghost" style="font-size:12px;padding:5px 12px" onclick="doLogout()">退出</button>
      </div>
    </div>

    <div class="main">
      <div class="page active" id="page-today">
        <div class="card clock-card">
          <div class="clock-time" id="clk"></div>
          <div class="clock-date" id="clk-date"></div>
          <div class="next-pill" id="next-pill">计算中...</div>
          <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
          <div class="prog-lbl" id="prog-lbl">今日服药进度 0/0</div>
        </div>
        <div id="today-blocks"><div class="loading">加载中...</div></div>
      </div>

      <div class="page" id="page-history">
        <div class="page-title">服药记录</div>
        <div class="card">
          <div class="filter-bar">
            <div class="form-group"><label>开始日期</label><input type="date" id="h-from"></div>
            <div class="form-group"><label>结束日期</label><input type="date" id="h-to"></div>
            <button class="btn btn-primary" onclick="loadHistory()">查询</button>
          </div>
        </div>
        <div id="hist-content"><div class="loading">请选择日期范围</div></div>
      </div>

      <div class="page" id="page-schedule">
        <div class="sec-hdr">
          <div class="page-title" style="margin:0">用药计划</div>
          <button class="btn btn-primary" onclick="addBlock()">+ 添加时间段</button>
        </div>
        <div id="sched-content"><div class="loading">加载中...</div></div>
      </div>

      <div class="page" id="page-users">
        <div class="sec-hdr">
          <div class="page-title" style="margin:0">用户管理</div>
          <button class="btn btn-primary" onclick="showAddUser()">+ 新建用户</button>
        </div>
        <div id="users-content"><div class="loading">加载中...</div></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── API ────────────────────────────────────────────────────────────────
let AUTH_TOKEN = '';

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${AUTH_TOKEN}` }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  if (!r.ok && r.status === 401) { doLogout(); return null; }
  return r.json();
}

const GET    = p        => api('GET',    p);
const POST   = (p, b)  => api('POST',   p, b);
const PUT    = (p, b)  => api('PUT',    p, b);
const DELETE = p        => api('DELETE', p);

// ── Helpers ────────────────────────────────────────────────────────────
function today() { return new Date().toISOString().slice(0, 10); }
function fmtTime(iso) { return iso ? new Date(iso).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : ''; }
function fmtDate(d) { return new Date(d + 'T12:00:00').toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'short' }); }

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, .25, .5].forEach(t => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880; o.type = 'sine';
      g.gain.setValueAtTime(.3, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + t + .3);
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + .35);
    });
  } catch {}
}

// ── State ──────────────────────────────────────────────────────────────
let CU = null;          // current user
let patients = [];
let pid = null;         // selected patient id
let schedule = [];      // today's time blocks with meds
let todayLogs = {};     // medication_id -> log row
let alarmFired = {};
let clockTick = null;

// ── Auth ───────────────────────────────────────────────────────────────
document.getElementById('l-pin').addEventListener('keydown', e => e.key === 'Enter' && doLogin());

async function doLogin() {
  const username = document.getElementById('l-user').value.trim();
  const pin      = document.getElementById('l-pin').value.trim();
  const errEl    = document.getElementById('login-err');
  errEl.style.display = 'none';
  if (!username || !pin) { showErr('请填写用户名和密码'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = '登录中...';
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, pin })
  });
  btn.disabled = false; btn.textContent = '登 录';
  if (!res.ok) { showErr('用户名或密码错误'); return; }
  const data = await res.json();
  AUTH_TOKEN = data.token;
  CU = data.user;
  initApp();
}

function showErr(m) { const e = document.getElementById('login-err'); e.textContent = m; e.style.display = 'block'; }

function doLogout() {
  CU = null; patients = []; pid = null; schedule = []; todayLogs = {}; alarmFired = {};
  AUTH_TOKEN = '';
  if (clockTick) clearInterval(clockTick);
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

// ── Init ───────────────────────────────────────────────────────────────
async function initApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('sb-user').textContent = CU.display_name;
  document.getElementById('sb-role').textContent = { admin: '管理员', caregiver: '护理员', patient: '患者（仅查看）' }[CU.role];

  if (CU.role === 'patient')  document.getElementById('nav-schedule').style.display = 'none';
  if (CU.role === 'admin')    document.getElementById('nav-users').style.display = 'flex';

  patients = await GET('/patients') || [];
  const sel = document.getElementById('pt-select');
  sel.innerHTML = patients.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  if (patients.length) pid = patients[0].id;
  document.getElementById('pt-wrap').style.display = patients.length <= 1 ? 'none' : 'block';

  const d = new Date(); d.setDate(d.getDate() - 6);
  document.getElementById('h-from').value = d.toISOString().slice(0, 10);
  document.getElementById('h-to').value = today();

  startClock();
  await loadToday();
}

function onPatientChange() {
  pid = parseInt(document.getElementById('pt-select').value);
  alarmFired = {};
  loadToday();
}

// ── Navigation ─────────────────────────────────────────────────────────
function go(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');
  if (page === 'history') loadHistory();
  if (page === 'schedule') loadSchedule();
  if (page === 'users') loadUsers();
}

// ── Clock ──────────────────────────────────────────────────────────────
function startClock() {
  if (clockTick) clearInterval(clockTick);
  function tick() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const ss = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clk').innerHTML = `${hh}:${mm}<span class="clock-sec">:${ss}</span>`;
    document.getElementById('clk-date').textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

    const cur = now.getHours() * 60 + now.getMinutes();
    let next = null, minD = Infinity;
    schedule.forEach(b => {
      const [bh, bm] = b.time_hhmm.split(':').map(Number), bMin = bh * 60 + bm;
      const diff = bMin - cur;
      if (diff > 0 && diff < minD) { minD = diff; next = b; }
      if (diff === 0 && ss === '00' && !alarmFired[b.time_hhmm]) { alarmFired[b.time_hhmm] = true; playBeep(); }
    });
    document.getElementById('next-pill').textContent = next
      ? `下次用药：${next.time_hhmm}（${Math.floor(minD / 60) > 0 ? Math.floor(minD / 60) + '小时' : ''}${minD % 60}分钟后）`
      : '今日用药已全部完成 ✓';
    refreshDots();
  }
  tick(); clockTick = setInterval(tick, 1000);
}

function refreshDots() {
  const cur = new Date().getHours() * 60 + new Date().getMinutes();
  schedule.forEach(b => {
    const el = document.getElementById('tb-' + b.id); if (!el) return;
    const [bh, bm] = b.time_hhmm.split(':').map(Number), bMin = bh * 60 + bm;
    const isNow = Math.abs(cur - bMin) <= 30, isPast = cur > bMin + 30;
    el.className = 'tb-card' + (isNow ? ' active' : '') + (isPast ? ' past' : '');
    const dot = el.querySelector('.tb-dot');
    if (dot) { dot.className = 'tb-dot' + (isNow ? ' dot-on' : isPast ? ' dot-past' : ''); }
    const badge = el.querySelector('.tb-badge');
    if (badge) {
      badge.className = 'tb-badge' + (isNow ? ' badge-now' : isPast ? ' badge-past' : '');
      badge.textContent = isNow ? '当前时段' : isPast ? '已过' : '';
    }
  });
}

// ── Today ──────────────────────────────────────────────────────────────
async function loadToday() {
  if (!pid) return;
  document.getElementById('today-blocks').innerHTML = '<div class="loading">加载中...</div>';
  const [sched, logs] = await Promise.all([
    GET(`/patients/${pid}/schedule`),
    GET(`/patients/${pid}/logs?date=${today()}`)
  ]);
  schedule = sched || [];
  todayLogs = {};
  (logs || []).forEach(l => { todayLogs[l.medication_id] = l; });
  renderToday();
}

function renderToday() {
  const total = schedule.reduce((s, b) => s + b.meds.length, 0);
  const taken = Object.values(todayLogs).filter(l => l.taken == 1).length;
  const pct = total ? Math.round(taken / total * 100) : 0;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-lbl').textContent = `今日服药进度 ${taken}/${total}（${pct}%）`;

  const cur = new Date().getHours() * 60 + new Date().getMinutes();
  const html = schedule.map(block => {
    const [bh, bm] = block.time_hhmm.split(':').map(Number), bMin = bh * 60 + bm;
    const isNow = Math.abs(cur - bMin) <= 30, isPast = cur > bMin + 30;
    const rows = block.meds.map(med => {
      const log = todayLogs[med.id], done = log?.taken == 1;
      const canTap = CU.role !== 'patient';
      return `<div class="med-row">
        <div class="med-chk ${done ? 'on' : ''} ${!canTap ? 'readonly' : ''}"
             onclick="${canTap ? `tapMed(${med.id})` : ''}">
          <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
            <polyline points="1,4.5 4,7.5 10,1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="med-info">
          <div class="med-name ${done ? 'done' : ''}">${med.name}</div>
          <div class="med-dose">${med.dose}</div>
          ${med.note ? `<div class="med-note">${med.note}</div>` : ''}
        </div>
        ${done && log?.taken_at ? `<div class="med-ts">✓ ${fmtTime(log.taken_at)}</div>` : ''}
      </div>`;
    }).join('');
    return `<div class="tb-card ${isNow ? 'active' : ''} ${isPast ? 'past' : ''}" id="tb-${block.id}">
      <div class="tb-header">
        <div class="tb-dot ${isNow ? 'dot-on' : isPast ? 'dot-past' : ''}"></div>
        <span class="tb-time">${block.label}</span>
        <span class="tb-ctx">${block.context || ''}</span>
        <span class="tb-badge ${isNow ? 'badge-now' : isPast ? 'badge-past' : ''}">${isNow ? '当前时段' : isPast ? '已过' : ''}</span>
      </div>
      ${rows}
    </div>`;
  }).join('');
  document.getElementById('today-blocks').innerHTML = html || '<div class="empty">暂无用药数据</div>';
}

async function tapMed(medId) {
  const log = todayLogs[medId];
  const newTaken = !(log?.taken == 1);
  // Optimistic UI
  todayLogs[medId] = { ...(log || { medication_id: medId }), taken: newTaken ? 1 : 0, taken_at: newTaken ? new Date().toISOString() : null };
  renderToday();
  await POST(`/patients/${pid}/logs`, { medication_id: medId, scheduled_date: today(), taken: newTaken });
}

// ── History ────────────────────────────────────────────────────────────
async function loadHistory() {
  if (!pid) return;
  const from = document.getElementById('h-from').value;
  const to   = document.getElementById('h-to').value;
  document.getElementById('hist-content').innerHTML = '<div class="loading">加载中...</div>';
  const rows = await GET(`/patients/${pid}/logs?from=${from}&to=${to}`) || [];
  if (!rows.length) { document.getElementById('hist-content').innerHTML = '<div class="empty">该时间段内暂无记录</div>'; return; }

  const byDate = {};
  rows.forEach(r => { if (!byDate[r.scheduled_date]) byDate[r.scheduled_date] = []; byDate[r.scheduled_date].push(r); });

  const html = Object.keys(byDate).map(date => {
    const dr = byDate[date];
    const tk = dr.filter(r => r.taken == 1).length;
    const pct = Math.round(tk / dr.length * 100);
    const pc = pct >= 80 ? 'pct-hi' : pct >= 50 ? 'pct-md' : 'pct-lo';
    const items = dr.map(r => `
      <div class="h-item ${r.taken == 1 ? 'h-taken' : 'h-missed'}">
        <div class="h-icon">${r.taken == 1 ? '✅' : '❌'}</div>
        <div>
          <div class="h-name">${r.med_name}</div>
          <div class="h-detail">${r.block_label} · ${r.dose}</div>
          <div class="h-time">${r.taken == 1 && r.taken_at ? fmtTime(r.taken_at) : '<span style="color:var(--danger)">未服用</span>'}</div>
        </div>
      </div>`).join('');
    return `<div>
      <div class="day-hdr">
        <div class="day-title">${fmtDate(date)}</div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:12px;color:var(--text2)">${tk}/${dr.length} 次</span>
          <span class="stat-pct ${pc}">${pct}%</span>
        </div>
      </div>
      <div class="hist-grid">${items}</div>
    </div>`;
  }).join('');
  document.getElementById('hist-content').innerHTML = html;
}

// ── Schedule editor ────────────────────────────────────────────────────
let schedData = [];

async function loadSchedule() {
  if (!pid) return;
  document.getElementById('sched-content').innerHTML = '<div class="loading">加载中...</div>';
  schedData = await GET(`/patients/${pid}/schedule`) || [];
  renderSchedule();
}

function renderSchedule() {
  const html = schedData.map(block => `
    <div class="ed-block">
      <div class="ed-bh">
        <span class="bt">${block.label}</span>
        <span class="bc">${block.context || ''}</span>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button class="btn btn-ghost" style="font-size:12px;padding:5px 10px" onclick="editBlock(${block.id})">编辑时段</button>
          <button class="btn btn-danger" style="font-size:12px;padding:5px 10px" onclick="deleteBlock(${block.id})">删除时段</button>
        </div>
      </div>
      <div class="ed-meds" id="em-${block.id}">
        ${block.meds.map(m => `
          <div class="ed-mr">
            <div class="ed-mi">
              <div class="ed-mn">${m.name}</div>
              <div class="ed-md">${m.dose}${m.note ? ' · ' + m.note : ''}</div>
            </div>
            <div class="ed-ma">
              <button class="btn btn-ghost" style="font-size:12px;padding:5px 10px" onclick="editMed(${m.id},${block.id})">编辑</button>
              <button class="btn btn-danger" style="font-size:12px;padding:5px 10px" onclick="deleteMed(${m.id})">删除</button>
            </div>
          </div>`).join('')}
        <div style="padding:10px 16px">
          <button class="btn btn-secondary" style="font-size:12px" onclick="addMed(${block.id})">+ 添加药物</button>
        </div>
      </div>
    </div>`).join('');
  document.getElementById('sched-content').innerHTML = html || '<div class="empty">暂无用药计划</div>';
}

function inlineForm(container, html) {
  const old = document.getElementById('_if'); if (old) old.remove();
  const d = document.createElement('div'); d.id = '_if'; d.innerHTML = html;
  document.getElementById(container).prepend(d);
}

function addMed(blockId) {
  inlineForm('em-' + blockId, `<div class="inline-form">
    <div class="g2">
      <div class="form-group"><label>药物名称</label><input id="_mn" placeholder="如：息宁缓释片"></div>
      <div class="form-group"><label>剂量</label><input id="_md" placeholder="如：50/200mg × 1片"></div>
    </div>
    <div class="form-group" style="margin-top:10px"><label>备注说明</label><input id="_mk" placeholder="服用注意事项"></div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveMed(null,${blockId})">保存</button>
      <button class="btn btn-secondary" onclick="clearForm()">取消</button>
    </div>
  </div>`);
}

function editMed(medId, blockId) {
  const blk = schedData.find(b => b.id == blockId);
  const med = blk?.meds.find(m => m.id == medId); if (!med) return;
  inlineForm('em-' + blockId, `<div class="inline-form">
    <div class="g2">
      <div class="form-group"><label>药物名称</label><input id="_mn" value="${med.name}"></div>
      <div class="form-group"><label>剂量</label><input id="_md" value="${med.dose}"></div>
    </div>
    <div class="form-group" style="margin-top:10px"><label>备注说明</label><input id="_mk" value="${med.note || ''}"></div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveMed(${medId},${blockId})">保存</button>
      <button class="btn btn-secondary" onclick="clearForm()">取消</button>
    </div>
  </div>`);
}

async function saveMed(medId, blockId) {
  const name = document.getElementById('_mn').value.trim();
  const dose = document.getElementById('_md').value.trim();
  const note = document.getElementById('_mk').value.trim();
  if (!name || !dose) { alert('请填写药物名称和剂量'); return; }
  if (medId) await PUT(`/medications/${medId}`, { name, dose, note });
  else        await POST('/medications', { block_id: blockId, name, dose, note });
  clearForm(); await loadSchedule();
}

async function deleteMed(id) {
  if (!confirm('确认删除该药物？')) return;
  await DELETE(`/medications/${id}`); await loadSchedule();
}

function addBlock() {
  const old = document.getElementById('_bf'); if (old) old.remove();
  const d = document.createElement('div'); d.id = '_bf';
  d.innerHTML = `<div class="card" style="background:#f8fafc">
    <div style="font-weight:600;margin-bottom:14px">新建时间段</div>
    <div class="g2">
      <div class="form-group"><label>时间（HH:MM）</label><input id="_bt" placeholder="如：10:30"></div>
      <div class="form-group"><label>说明</label><input id="_bc" placeholder="如：午饭后"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveBlock(null)">保存</button>
      <button class="btn btn-secondary" onclick="document.getElementById('_bf').remove()">取消</button>
    </div>
  </div>`;
  document.getElementById('sched-content').prepend(d);
}

function editBlock(blockId) {
  const blk = schedData.find(b => b.id == blockId); if (!blk) return;
  const old = document.getElementById('_bf'); if (old) old.remove();
  const d = document.createElement('div'); d.id = '_bf';
  d.innerHTML = `<div class="card" style="background:#f8fafc">
    <div style="font-weight:600;margin-bottom:14px">编辑时间段</div>
    <div class="g2">
      <div class="form-group"><label>时间（HH:MM）</label><input id="_bt" value="${blk.time_hhmm}"></div>
      <div class="form-group"><label>说明</label><input id="_bc" value="${blk.context || ''}"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveBlock(${blockId})">保存</button>
      <button class="btn btn-secondary" onclick="document.getElementById('_bf').remove()">取消</button>
    </div>
  </div>`;
  document.getElementById('sched-content').prepend(d);
}

async function saveBlock(blockId) {
  const time = document.getElementById('_bt').value.trim();
  const ctx  = document.getElementById('_bc').value.trim();
  if (!/^\d{2}:\d{2}$/.test(time)) { alert('时间格式应为 HH:MM，如 08:30'); return; }
  if (blockId) await PUT(`/blocks/${blockId}`, { label: time, time_hhmm: time, context: ctx });
  else          await POST('/blocks', { patient_id: pid, label: time, time_hhmm: time, context: ctx });
  document.getElementById('_bf')?.remove();
  await loadSchedule();
}

async function deleteBlock(id) {
  if (!confirm('确认删除整个时间段（含全部药物）？')) return;
  await DELETE(`/blocks/${id}`); await loadSchedule();
}

function clearForm() { const e = document.getElementById('_if'); if (e) e.remove(); }

// ── Users ──────────────────────────────────────────────────────────────
let allPatients = [];

async function loadUsers() {
  document.getElementById('users-content').innerHTML = '<div class="loading">加载中...</div>';
  const [users, pats] = await Promise.all([GET('/users'), GET('/patients')]);
  allPatients = pats || [];
  const rl = { admin: '管理员', caregiver: '护理员', patient: '患者' };
  const rb = { admin: 'r-admin', caregiver: 'r-caregiver', patient: 'r-patient' };
  const rows = (users || []).map(u => {
    const acc = (u.access || []).map(a => `${a.pname}（${a.access_level === 'full' ? '完全' : '仅看'}）`).join('、');
    return `<div class="u-row">
      <div class="u-av">${u.display_name.slice(0, 1)}</div>
      <div class="u-info">
        <div class="u-name">${u.display_name}<span class="rbadge ${rb[u.role]}">${rl[u.role]}</span></div>
        <div class="u-meta">@${u.username}${acc ? ' · 关联：' + acc : ''}</div>
      </div>
      ${u.id !== CU.id ? `<button class="btn btn-danger" style="font-size:12px;padding:5px 12px" onclick="delUser(${u.id})">删除</button>` : ''}
    </div>`;
  }).join('');
  document.getElementById('users-content').innerHTML = `<div class="card">${rows}</div>`;
}

function showAddUser() {
  const po = allPatients.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  const old = document.getElementById('_uf'); if (old) old.remove();
  const d = document.createElement('div'); d.id = '_uf';
  d.innerHTML = `<div class="card" style="background:#f8fafc;margin-bottom:16px">
    <div style="font-weight:600;margin-bottom:14px">新建用户</div>
    <div class="g2">
      <div class="form-group"><label>用户名</label><input id="_uu"></div>
      <div class="form-group"><label>密码/PIN</label><input id="_up"></div>
      <div class="form-group"><label>显示名称</label><input id="_un"></div>
      <div class="form-group"><label>角色</label>
        <select id="_ur">
          <option value="admin">管理员（完全权限）</option>
          <option value="caregiver" selected>护理员（可操作）</option>
          <option value="patient">患者（仅查看）</option>
        </select>
      </div>
      <div class="form-group"><label>关联患者</label>
        <select id="_upat"><option value="">不关联</option>${po}</select>
      </div>
      <div class="form-group"><label>访问级别</label>
        <select id="_ua">
          <option value="full">完全访问</option>
          <option value="view">仅查看</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="createUser()">创建用户</button>
      <button class="btn btn-secondary" onclick="document.getElementById('_uf').remove()">取消</button>
    </div>
  </div>`;
  document.getElementById('users-content').prepend(d);
}

async function createUser() {
  const username     = document.getElementById('_uu').value.trim();
  const pin          = document.getElementById('_up').value.trim();
  const display_name = document.getElementById('_un').value.trim();
  const role         = document.getElementById('_ur').value;
  const patient_id   = document.getElementById('_upat').value || null;
  const access_level = document.getElementById('_ua').value;
  if (!username || !pin || !display_name) { alert('请填写用户名、密码和显示名称'); return; }
  await POST('/users', { username, pin, role, display_name, patient_id, access_level });
  document.getElementById('_uf')?.remove();
  await loadUsers();
}

async function delUser(id) {
  if (!confirm('确认删除该用户？')) return;
  await DELETE(`/users/${id}`); await loadUsers();
}
</script>
</body>
</html>
